<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes - SafeRoute Admin</title>
    <meta name="description" content="View and manage route requests">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="sidebar-logo-text">
                        <h2>SafeRoute</h2>
                        <p>Admin Panel</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="dashboard.html" class="nav-item">
                        <i class="fas fa-chart-line"></i>
                        Dashboard
                    </a>
                    <a href="users.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        Users
                    </a>
                    <a href="routes.html" class="nav-item active">
                        <i class="fas fa-route"></i>
                        Routes
                    </a>
                    <a href="reports.html" class="nav-item">
                        <i class="fas fa-exclamation-triangle"></i>
                        Reports
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="#" class="nav-item" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-title">
                    <h1>Route Requests</h1>
                    <p>View safe and shortest route requests</p>
                </div>
                <div class="top-bar-actions">
                    <div class="user-profile">
                        <div class="user-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="user-info">
                            <h4 id="adminName">Admin</h4>
                            <p id="adminEmail">admin@saferoute.com</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon primary">
                            <i class="fas fa-route"></i>
                        </div>
                    </div>
                    <div class="stat-value" id="totalRoutes">0</div>
                    <div class="stat-label">Total Routes</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon success">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                    </div>
                    <div class="stat-value" id="safeRoutes">0</div>
                    <div class="stat-label">Safe Routes</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon warning">
                            <i class="fas fa-tachometer-alt"></i>
                        </div>
                    </div>
                    <div class="stat-value" id="shortestRoutes">0</div>
                    <div class="stat-label">Shortest Routes</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon danger">
                            <i class="fas fa-clock"></i>
                        </div>
                    </div>
                    <div class="stat-value" id="todayRoutes">0</div>
                    <div class="stat-label">Today's Routes</div>
                </div>
            </div>

            <!-- Routes Table -->
            <div class="data-table-container">
                <div class="table-header">
                    <h3>All Route Requests</h3>
                    <div class="table-actions">
                        <button class="btn btn-secondary" onclick="filterRoutes('all')" id="filterAll">
                            <i class="fas fa-list"></i>
                            All
                        </button>
                        <button class="btn btn-secondary" onclick="filterRoutes('safest')" id="filterSafest">
                            <i class="fas fa-shield-alt"></i>
                            Safe
                        </button>
                        <button class="btn btn-secondary" onclick="filterRoutes('shortest')" id="filterShortest">
                            <i class="fas fa-tachometer-alt"></i>
                            Shortest
                        </button>
                        <button class="btn btn-primary" onclick="refreshRoutes()">
                            <i class="fas fa-sync-alt"></i>
                            Refresh
                        </button>
                    </div>
                </div>

                <div id="routesTableContainer">
                    <div class="loading-container">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/routes.js"></script>
</body>

</html>
